<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Color Example</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body{
            background-color:#f4f4f4;   /* light grey page */
            color:#333;                 /* dark grey text */
            font-family:Arial, sans-serif;
            margin:0;
            padding:20px;
        }

        .card{
            background-color:rgba(0,128,128,0.1); /* faint teal */
            color:hsl(180,100%,25%);
            padding:20px;
            border-radius:10px;
            max-width:500px;
            margin:20px auto;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);

            .card p{
                 font-family: "Bebas Neue", sans-serif;
                 font-weight: 400;
                 font-style: normal;
            }
        }

        .hero{
            background-image:url("https://picsum.photos/id/1018/800/400");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            height:500px;
            display:flex;
            justify-content:center;
            align-items:center;
            border-radius:10px;
        }

        .hero h1{
            background:rgb(84, 82, 82);
            padding:10px 20px;
            border-radius:5px;
            color:white;
        }
    </style>
</head>

<body>

    <section class="hero">
        <h1>Welcome to My Website</h1>
    </section>

    <div class="card">
        <h2>Card Title</h2>
        <p>
            This card uses a faint teal background created with
            <strong>rgba()</strong> and a dark teal text color using
            <strong>hsl()</strong>.
        </p>
    </div>

</body>
</html>
